    <main class="reveal">
        <h2 class="title">Contact <em class="violet">Form</em></h2>
        <p class="desc">How you can contact me directly</p>
        <form class="form" id="Personal" action="https://formspree.io/f/mzzazzne" method="post" >
            <fieldset class="fieldset">
                <p class="inside">
                    <label for="name">Full Name</label>
                    <input type="text" name="name" id="name" required autofocus autocomplete="on">
                </p>
                <p class="inside">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" required autocomplete="on">
                    <span class="error-msg" id="email-error"></span>
                </p>
                <p class="inside3">
                    <p class="label">Profile:</p>
                    <ul class="ops" style="list-style: none; padding: 0;">
                    <li class="op">
                        <input class="box" type="radio" id="ind" name="part" value="individual" required>
                        <label class="radio-op" for="ind">Individual</label>
                    </li>
                    <li class="op">
                        <input class="box" type="radio" id="organ" name="part" value="organisation">
                        <label class="radio-op" for="organ">Organisation</label>
                    </li>
                    <li class="op">
                        <input class="box" type="radio" id="busin" name="part" value="busin">
                        <label class="radio-op" for="busin">Business</label>
                    </li>
                    <li class="op"  >
                        <input class="box" type="radio" id="other" name="part" value="other">
                        <label class="radio-op" for="other">Other</label>
                    </li>
                    </ul>
                </p>
                <p class="inside">
                    <label class="reason" for="reason">Purpose for contact: </label>
                    <textarea name="reason" id="reason" rows="3" cols="60" placeholder="I want to contact because..." required></textarea>
                </p>
                <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" />
                <div class="form-actions">
                    <button type="reset" class="btn-reset">Reset</button>
                    <button type="submit" class="btn-submit">Submit</button>
                </div>
                
            </fieldset>
        </form>
    </main>
    <script>
    const form = document.getElementById("Personal");
  const submitBtn = form.querySelector(".btn-submit");
  const emailInput = document.getElementById("email");
  const emailGroup = document.getElementById("email-group");
  const emailError = document.getElementById("email-error");
  
  // Standard Email Regex pattern
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  emailInput.addEventListener("blur", validateEmail);

  // Check actively ONLY if they already messed up (so it clears instantly)
  emailInput.addEventListener("input", () => {
    if (emailGroup.classList.contains("invalid")) {
      validateEmail();
    }
  });

  function validateEmail() {
    const value = emailInput.value.trim();
    let isValid = false;

    if (value === "") {
      emailGroup.classList.add("invalid");
      emailError.textContent = "Email is required to reach out!";
    } else if (!emailRegex.test(value)) {
      emailGroup.classList.add("invalid");
      emailError.textContent = "Oops! Please enter a valid email address.";
    } else {
      emailGroup.classList.remove("invalid");
      emailError.textContent = "";
      isValid = true;
    }
    return isValid;
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault(); // Stop the Formspree redirect

    // Final safety check: Don't submit if the email is broken
    if (!validateEmail()) {
      emailInput.focus(); // Jump them back to the email field
      return; 
    }

    // UX: Change button to show it's working
    const originalBtnText = submitBtn.textContent;
    submitBtn.textContent = "Sending...";
    submitBtn.disabled = true;

    const formData = new FormData(form);

    try {
      // Send the data silently in the background
      const response = await fetch(form.action, {
        method: form.method,
        body: formData,
        headers: {
          'Accept': 'application/json' 
        }
      });

      if (response.ok) {
        // Success!
        form.reset();
        submitBtn.textContent = "Sent Successfully! 🚀";
        submitBtn.style.backgroundColor = "#4caf50"; // Turn it green
        submitBtn.style.borderColor = "#4caf50";
      } else {
        submitBtn.textContent = "Oops! Error sending.";
      }
    } catch (error) {
      submitBtn.textContent = "Network Error!";
    }
    setTimeout(() => {
      submitBtn.textContent = originalBtnText;
      submitBtn.style.backgroundColor = ""; 
      submitBtn.style.borderColor = "";
      submitBtn.disabled = false;
    }, 3000);
  });
    </script>
